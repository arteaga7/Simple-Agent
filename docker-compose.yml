services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      # Host 5433 -> container 5432 (avoids clashing with a local Postgres on 5432).
      - "5433:5432"

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-chatbot}@db:5432/${POSTGRES_DB:-chatbot}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  ui:
    build: .
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "8501:8501"

volumes:
  pgdata:
