services:
  # 1. El servicio de la Base de Datos (Render creará una instancia real de Postgres automáticamente)
  - type: database
    name: chatbot-db
    databaseName: chatbot
    user: chatbot
    plan: free # Plan gratuito

  # 2. Tu API de FastAPI
  - type: web
    name: chatbot-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chatbot-db
          property: connectionString

  # 3. Tu Interfaz de Streamlit
  - type: web
    name: chatbot-ui
    env: docker
    dockerfilePath: ./Dockerfile # Render usará este Dockerfile
    dockerCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    plan: free
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: chatbot-api
          property: host