# 1. Definición de la Base de Datos Administrada
databases:
  - name: chatbot-db
    databaseName: chatbot
    user: chatbot
    plan: free

# 2. Definición de tus Servicios de Aplicación (API y UI)
services:
  # Tu API de FastAPI
  - type: web
    name: chatbot-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chatbot-db
          property: connectionString

  # Tu Interfaz de Streamlit
  - type: web
    name: chatbot-ui
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    plan: free
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: chatbot-api
          property: host