# Render Blueprint — deploys the FastAPI API + Streamlit UI for Simple-Agent.
# Docs: https://render.com/docs/blueprint-spec
#
# Database: this blueprint REUSES your existing Render Postgres. Set DATABASE_URL
# (a `sync: false` secret) to your database's *Internal* Database URL in the
# dashboard when prompted. To have Render create & manage a fresh DB instead,
# uncomment the `databases:` block and swap DATABASE_URL for the `fromDatabase`
# form shown in the comment under the api service. The app auto-seeds the
# catalog on startup, so a brand-new database works out of the box.

# databases:
#   - name: simple-agent-db
#     databaseName: chatbot
#     user: chatbot
#     plan: free
#     region: oregon

services:
  # ---- Backend: FastAPI agent ----
  - type: web
    name: simple-agent-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Render injects $PORT; the container must bind to it.
    dockerCommand: sh -c "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # paste your Gemini API key in the dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: DATABASE_URL
        sync: false          # paste your Render Postgres *Internal* Database URL
      # To use a Render-managed database instead, delete the DATABASE_URL entry
      # above and uncomment the `databases:` block at the top plus this:
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: simple-agent-db
      #     property: connectionString

  # ---- Frontend: Streamlit UI ----
  - type: web
    name: simple-agent-ui
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: sh -c "streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false"
    healthCheckPath: /_stcore/health
    envVars:
      # Auto-wired to the API service's hostname; app.py prepends https://.
      - key: API_URL
        fromService:
          type: web
          name: simple-agent-api
          property: host
